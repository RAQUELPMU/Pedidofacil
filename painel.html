<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel | Meu Anota.ai</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .dashboard-header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            padding: 20px 0;
        }
        .container-dash {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }
        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-sair {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 8px 20px;
            border-radius: 50px;
            color: white;
            cursor: pointer;
        }
        .produtos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .card-produto {
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .btn-add {
            background: #e67e22;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            margin: 20px 0;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
        }
        .link-cardapio {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            text-align: center;
        }
        .link-cardapio input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="dashboard-header">
    <div class="container-dash">
        <div class="header-flex">
            <h2>🍽️ Painel <span style="color:#e67e22">Anota.ai</span></h2>
            <button class="btn-sair" onclick="logout()">Sair</button>
        </div>
    </div>
</div>

<div class="container-dash">
    <div class="link-cardapio">
        <strong>🔗 Seu cardápio digital:</strong>
        <input type="text" id="linkCardapio" readonly>
        <button onclick="copiarLink()" style="margin-top:10px; padding:8px 16px; background:#27ae60; color:white; border:none; border-radius:8px;">Copiar link</button>
    </div>
    
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3>📋 Meus Produtos</h3>
        <button class="btn-add" onclick="abrirModalProduto()">+ Novo Produto</button>
    </div>
    
    <div id="produtosList" class="produtos-grid">
        <!-- Produtos aparecem aqui -->
    </div>
</div>

<!-- Modal de Produto -->
<div id="modalProduto" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Novo Produto</h3>
        <form id="produtoForm">
            <div class="form-group" style="margin-bottom:15px;">
                <label>Nome do produto *</label>
                <input type="text" id="produtoNome" required style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px;">
            </div>
            <div class="form-group" style="margin-bottom:15px;">
                <label>Preço (R$) *</label>
                <input type="number" id="produtoPreco" step="0.01" required style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px;">
            </div>
            <div class="form-group" style="margin-bottom:15px;">
                <label>Descrição</label>
                <input type="text" id="produtoDescricao" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px;">
            </div>
            <div class="form-group" style="margin-bottom:15px;">
                <label>Categoria</label>
                <select id="produtoCategoria" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px;">
                    <option>Principal</option>
                    <option>Bebidas</option>
                    <option>Sobremesas</option>
                    <option>Entradas</option>
                </select>
            </div>
            <button type="submit" style="width:100%; padding:12px; background:#e67e22; color:white; border:none; border-radius:50px; font-weight:600;">Salvar produto</button>
            <button type="button" onclick="fecharModal()" style="width:100%; margin-top:10px; padding:10px; background:#ccc; border:none; border-radius:50px;">Cancelar</button>
        </form>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyA8qo7qFYXlqEriMBeyoyELwtiRPGxpVc4",
        authDomain: "lanchepodpah.firebaseapp.com",
        projectId: "lanchepodpah",
        storageBucket: "lanchepodpah.firebasestorage.app",
        messagingSenderId: "451860544292",
        appId: "1:451860544292:web:4dbbe9c0c53e8cd0cf91b1"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    const restaurante = JSON.parse(localStorage.getItem('restauranteLogado'));
    if (!restaurante) window.location.href = 'login.html';
    
    // Mostrar link do cardápio
    const linkCardapio = `${window.location.origin}/cardapio.html?rest=${restaurante.email}`;
    document.getElementById('linkCardapio').value = linkCardapio;
    
    // Carregar produtos
    async function carregarProdutos() {
        const q = query(collection(db, "produtos"), where("restauranteId", "==", restaurante.email));
        const snapshot = await getDocs(q);
        const container = document.getElementById('produtosList');
        
        if (snapshot.empty) {
            container.innerHTML = '<p style="text-align:center; color:#999;">Nenhum produto cadastrado. Clique em "+ Novo Produto" para começar.</p>';
            return;
        }
        
        container.innerHTML = '';
        snapshot.forEach(doc => {
            const p = doc.data();
            container.innerHTML += `
                <div class="card-produto">
                    <h4>${p.nome}</h4>
                    <p style="color:#e67e22; font-size:20px; font-weight:bold;">R$ ${p.preco.toFixed(2)}</p>
                    <p style="color:#666; font-size:14px;">${p.descricao || ''}</p>
                    <small>Categoria: ${p.categoria}</small><br>
                    <button onclick="deletarProduto('${doc.id}')" style="margin-top:10px; background:#e74c3c; color:white; border:none; padding:5px 12px; border-radius:8px;">Excluir</button>
                </div>
            `;
        });
    }
    
    // Adicionar produto - CRIA A COLEÇÃO "produtos" AUTOMATICAMENTE
    document.getElementById('produtoForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const nome = document.getElementById('produtoNome').value;
        const preco = parseFloat(document.getElementById('produtoPreco').value);
        const descricao = document.getElementById('produtoDescricao').value;
        const categoria = document.getElementById('produtoCategoria').value;
        
        if (!nome || !preco) return;
        
        await addDoc(collection(db, "produtos"), {
            nome, preco, descricao, categoria,
            restauranteId: restaurante.email,
            disponivel: true,
            createdAt: new Date().toISOString()
        });
        
        fecharModal();
        document.getElementById('produtoForm').reset();
        carregarProdutos();
    });
    
    window.deletarProduto = async (id) => {
        if (confirm('Remover este produto?')) {
            await deleteDoc(doc(db, "produtos", id));
            carregarProdutos();
        }
    };
    
    window.abrirModalProduto = () => {
        document.getElementById('modalTitle').textContent = 'Novo Produto';
        document.getElementById('produtoForm').reset();
        document.getElementById('modalProduto').style.display = 'flex';
    };
    
    window.fecharModal = () => {
        document.getElementById('modalProduto').style.display = 'none';
    };
    
    window.logout = () => {
        localStorage.removeItem('restauranteLogado');
        window.location.href = 'login.html';
    };
    
    window.copiarLink = () => {
        const input = document.getElementById('linkCardapio');
        input.select();
        document.execCommand('copy');
        alert('Link copiado! Compartilhe com seus clientes.');
    };
    
    carregarProdutos();
</script>

</body>
</html>
