<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Meu Anota.ai</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .login-container {
            max-width: 500px;
            margin: 80px auto;
            padding: 40px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        }
        .login-container h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #1a1a2e;
        }
        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: #f0f0f0;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: #e67e22;
            color: white;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 14px;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #e67e22;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            display: none;
        }
        .logo-small {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo-small">
        🍽️ Anota<span style="color:#e67e22">.ai</span>
    </div>
    
    <div class="tab-buttons">
        <button class="tab-btn active" onclick="showTab('login')">Entrar</button>
        <button class="tab-btn" onclick="showTab('cadastro')">Cadastrar</button>
    </div>
    
    <!-- Formulário de Login -->
    <div id="loginTab">
        <form id="loginForm">
            <div class="form-group">
                <label>Email do restaurante *</label>
                <input type="email" id="loginEmail" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label>Senha *</label>
                <input type="password" id="loginSenha" placeholder="Digite sua senha" required>
            </div>
            <button type="submit" class="btn-login">Entrar no sistema →</button>
        </form>
    </div>
    
    <!-- Formulário de Cadastro -->
    <div id="cadastroTab" style="display:none">
        <form id="cadastroForm">
            <div class="form-group">
                <label>Nome do restaurante *</label>
                <input type="text" id="cadastroNome" placeholder="Ex: Pizzaria do João" required>
            </div>
            <div class="form-group">
                <label>Email do restaurante *</label>
                <input type="email" id="cadastroEmail" placeholder="contato@restaurante.com" required>
            </div>
            <div class="form-group">
                <label>WhatsApp *</label>
                <input type="tel" id="cadastroWhatsapp" placeholder="(11) 99999-9999" required>
            </div>
            <div class="form-group">
                <label>Senha *</label>
                <input type="password" id="cadastroSenha" placeholder="Mínimo 6 caracteres" required>
            </div>
            <button type="submit" class="btn-login">Criar conta grátis →</button>
        </form>
    </div>
    
    <div id="message" class="message"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyA8qo7qFYXlqEriMBeyoyELwtiRPGxpVc4",
        authDomain: "lanchepodpah.firebaseapp.com",
        projectId: "lanchepodpah",
        storageBucket: "lanchepodpah.firebasestorage.app",
        messagingSenderId: "451860544292",
        appId: "1:451860544292:web:4dbbe9c0c53e8cd0cf91b1",
        measurementId: "G-MDH6SFMNFK"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    function showTab(tab) {
        document.getElementById('loginTab').style.display = tab === 'login' ? 'block' : 'none';
        document.getElementById('cadastroTab').style.display = tab === 'cadastro' ? 'block' : 'none';
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
    }
    
    function mostrarMensagem(texto, tipo) {
        const msg = document.getElementById('message');
        msg.textContent = texto;
        msg.style.backgroundColor = tipo === 'success' ? '#27ae60' : '#e74c3c';
        msg.style.color = 'white';
        msg.style.display = 'block';
        setTimeout(() => msg.style.display = 'none', 5000);
    }
    
    // MÁSCARA WHATSAPP
    document.getElementById('cadastroWhatsapp')?.addEventListener('input', function(e) {
        let value = e.target.value.replace(/\D/g, '');
        if (value.length <= 11) {
            if (value.length <= 2) e.target.value = `(${value}`;
            else if (value.length <= 6) e.target.value = `(${value.slice(0,2)}) ${value.slice(2)}`;
            else if (value.length <= 10) e.target.value = `(${value.slice(0,2)}) ${value.slice(2,6)}-${value.slice(6)}`;
            else e.target.value = `(${value.slice(0,2)}) ${value.slice(2,7)}-${value.slice(7,11)}`;
        }
    });
    
    // CADASTRO - CRIA A COLEÇÃO "restaurantes" AUTOMATICAMENTE
    document.getElementById('cadastroForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const nome = document.getElementById('cadastroNome').value;
        const email = document.getElementById('cadastroEmail').value;
        const whatsapp = document.getElementById('cadastroWhatsapp').value;
        const senha = document.getElementById('cadastroSenha').value;
        
        if (senha.length < 6) {
            mostrarMensagem('Senha precisa ter pelo menos 6 caracteres', 'error');
            return;
        }
        
        try {
            // Verificar se já existe
            const docRef = doc(db, "restaurantes", email);
            const docSnap = await getDoc(docRef);
            
            if (docSnap.exists()) {
                mostrarMensagem('Este email já está cadastrado!', 'error');
                return;
            }
            
            // CRIA A COLEÇÃO "restaurantes" AUTOMATICAMENTE
            await setDoc(docRef, {
                nome: nome,
                email: email,
                whatsapp: whatsapp,
                senha: btoa(senha), // SIMPLES (depois melhora)
                plano: 'start',
                createdAt: new Date().toISOString(),
                status: 'ativo'
            });
            
            mostrarMensagem('✅ Cadastro realizado! Faça login.', 'success');
            setTimeout(() => {
                showTab('login');
                document.getElementById('cadastroForm').reset();
            }, 2000);
            
        } catch (error) {
            console.error(error);
            mostrarMensagem('Erro ao cadastrar', 'error');
        }
    });
    
    // LOGIN
    document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const senha = document.getElementById('loginSenha').value;
        
        try {
            const docRef = doc(db, "restaurantes", email);
            const docSnap = await getDoc(docRef);
            
            if (!docSnap.exists()) {
                mostrarMensagem('Restaurante não encontrado!', 'error');
                return;
            }
            
            const dados = docSnap.data();
            if (btoa(senha) === dados.senha) {
                localStorage.setItem('restauranteLogado', JSON.stringify({
                    email: email,
                    nome: dados.nome,
                    whatsapp: dados.whatsapp
                }));
                window.location.href = 'painel.html';
            } else {
                mostrarMensagem('Senha incorreta!', 'error');
            }
        } catch (error) {
            mostrarMensagem('Erro ao fazer login', 'error');
        }
    });
    
    window.showTab = showTab;
</script>

</body>
  </html>
